# yaml-language-server: $schema=https://json.schemastore.org/chart.json
apiVersion: v2
type: application
name: fritzbox-exporter
description: A Helm chart for fritzbox-exporter
version: 3.0.0
# renovate: image=sealife/fritzbox-exporter
appVersion: "1.0"

home: https://charts.pascaliske.dev/charts/fritzbox-exporter/
sources:
  - https://github.com/pascaliske/helm-charts
  - https://git.r3ktm8.de/SeaLife-Docker/fritzbox_exporter
keywords:
  - fritzbox-exporter
  - fritzbox
  - prometheus
  - metrics
maintainers:
  - name: pascaliske
    email: info@pascaliske.dev
    url: https://pascaliske.dev

dependencies:
  - name: base
    version: 1.3.0
    repository: https://charts.pascaliske.dev

annotations:
  # possible kinds: added, changed, deprecated, removed, fixed, security
  artifacthub.io/changes: |
    - kind: changed
      description: 'Support specifying container-level security context.'
    - kind: added
      description: 'Support custom nodeSelector block.'
    - kind: added
      description: 'Support specifying priority class name.'
    - kind: added
      description: 'Support specifying extra containers.'
    - kind: added
      description: 'Support specifying extra init containers.'
    - kind: added
      description: 'Support specifying extra volumes and volume mounts.'
    - kind: added
      description: 'Support creation of extra templated objects.'
    - kind: added
      description: 'Support valueFrom syntax in environment variables.'
